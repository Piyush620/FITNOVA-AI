services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fitnova-ai
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_NAME: FitNova AI
      APP_ORIGIN: http://localhost
      APP_TRUST_PROXY: "true"
      SWAGGER_ENABLED: "true"
      CORS_ALLOW_LOCALHOST: "true"
      MONGODB_URI: mongodb://mongodb:27017/fitnova-ai
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-fitnova_local_access_secret_change_me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-fitnova_local_refresh_secret_change_me}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
      GLOBAL_RATE_LIMIT_TTL: ${GLOBAL_RATE_LIMIT_TTL:-60000}
      GLOBAL_RATE_LIMIT: ${GLOBAL_RATE_LIMIT:-100}
      AI_RATE_LIMIT_TTL: ${AI_RATE_LIMIT_TTL:-60000}
      AI_RATE_LIMIT: ${AI_RATE_LIMIT:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILES: "false"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongodb_data:
  redis_data:
